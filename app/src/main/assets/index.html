<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>StreamVault</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#16161f;
--acc:#6c5ce7;--acc-g:rgba(108,92,231,.35);--acc-s:rgba(108,92,231,.12);
--t1:#e8e6f0;--t2:#8a879a;--t3:#55526a;
--red:#ff4757;--red-s:rgba(255,71,87,.12);--grn:#2ed573;--org:#ffa502;
--brd:rgba(255,255,255,.06);--ov:rgba(6,6,12,.92);
--r:14px;--rs:8px;--sh:0 8px 32px rgba(0,0,0,.4);
}
html,body{height:100%;width:100%;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t1);overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
.app{display:flex;flex-direction:column;height:100%}
.app-content{flex:1;position:relative;overflow:hidden}
.screen{display:none;position:absolute;inset:0;flex-direction:column}
.screen.active{display:flex}
.bottom-nav{display:flex;background:var(--bg2);border-top:1px solid var(--brd);padding:6px 0 env(safe-area-inset-bottom,8px);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer;color:var(--t3);transition:color .2s}
.nav-item.active{color:var(--acc)}.nav-item svg{width:20px;height:20px}.nav-item span{font-size:10px;font-weight:600}
.hdr{padding:44px 20px 8px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--t1),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-r{display:flex;align-items:center;gap:6px}
.tag{font-size:10px;color:var(--t3);background:var(--bg2);padding:2px 7px;border-radius:10px;border:1px solid var(--brd);font-family:monospace}
.ib{width:32px;height:32px;border-radius:8px;background:var(--bg2);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);transition:all .2s}
.ib:active{transform:scale(.92)}.ib:hover{border-color:var(--acc);color:var(--acc)}.ib svg{width:15px;height:15px}
.sbar{margin:6px 20px 6px;position:relative}
.sbar input{width:100%;padding:10px 12px 10px 36px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);color:var(--t1);font-size:13px;outline:none;transition:border-color .2s}
.sbar input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-s)}
.sbar input::placeholder{color:var(--t3)}
.sbar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--t3)}
.pills{display:flex;gap:5px;padding:3px 20px 6px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
.pills::-webkit-scrollbar{display:none}
.pill{padding:4px 10px;border-radius:14px;font-size:10px;font-weight:500;white-space:nowrap;cursor:pointer;background:var(--bg2);border:1px solid var(--brd);color:var(--t2);transition:all .2s;flex-shrink:0}
.pill.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.list{flex:1;overflow-y:auto;padding:0 20px 90px;-webkit-overflow-scrolling:touch}
.list::-webkit-scrollbar{display:none}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 30px;text-align:center}
.empty .ew{width:56px;height:56px;border-radius:50%;background:var(--acc-s);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.empty .ew svg{width:24px;height:24px;color:var(--acc)}.empty h3{font-size:15px;font-weight:600;margin-bottom:4px}.empty p{font-size:11px;color:var(--t2);line-height:1.4;max-width:240px}
.item{display:flex;align-items:center;gap:9px;padding:10px;margin-bottom:4px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:all .15s;animation:si .2s ease forwards;opacity:0;transform:translateY(5px)}
@keyframes si{to{opacity:1;transform:translateY(0)}}
.item:active{transform:scale(.98)}
.item .th{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,var(--acc-s),rgba(108,92,231,.25));display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.item .th img{width:100%;height:100%;object-fit:cover}.item .th svg{width:16px;height:16px;color:var(--acc)}
.item .nfo{flex:1;min-width:0}.item .nfo .nm{font-size:12px;font-weight:500;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .nfo .mt{font-size:9px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .nfo .mt .cb{background:var(--acc-s);color:var(--acc);padding:1px 4px;border-radius:3px;font-size:8px;font-weight:600;margin-right:3px;text-transform:uppercase}
.item .nfo .mt .rb{background:rgba(46,213,115,.12);color:var(--grn);padding:1px 4px;border-radius:3px;font-size:8px;font-weight:600;margin-right:3px}
.item .nfo .mt .vb{background:rgba(255,165,2,.12);color:var(--org);padding:1px 4px;border-radius:3px;font-size:8px;font-weight:600;margin-right:3px}
.item .acts{display:flex;gap:1px;flex-shrink:0}
.item .acts button{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--t3);transition:all .2s}
.item .acts button svg{width:13px;height:13px}
.item .acts .eb:hover{background:var(--acc-s);color:var(--acc)}.item .acts .db:hover{background:var(--red-s);color:var(--red)}
.fab-g{position:fixed;bottom:66px;right:16px;z-index:50}
.fab{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--acc);box-shadow:0 4px 16px var(--acc-g)}
.fab:active{transform:scale(.92)}.fab svg{width:22px;height:22px;color:#fff}

/* ── Compact Filter Bar for Repo Browser ── */
.filter-bar{display:flex;gap:6px;padding:4px 20px 6px;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{display:none}
.fsel{padding:5px 10px;border-radius:14px;font-size:10px;font-weight:500;background:var(--bg2);border:1px solid var(--brd);color:var(--t2);cursor:pointer;appearance:none;outline:none;min-width:0;max-width:120px}
.fsel:focus{border-color:var(--acc)}.fsel option{background:var(--bg2);color:var(--t1)}
.fsel.active{border-color:var(--acc);color:var(--acc);background:var(--acc-s)}
.filter-bar .flbl{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;flex-shrink:0;letter-spacing:.3px}

/* ── Selection bar ── */
.sel-bar{display:none;padding:8px 16px;background:var(--acc);align-items:center;justify-content:space-between;flex-shrink:0}
.sel-bar.on{display:flex}.sel-bar .sl{font-size:12px;font-weight:600;color:#fff}
.sel-bar .sr{display:flex;gap:6px}
.sel-bar button{padding:5px 12px;border-radius:14px;border:none;font-size:10px;font-weight:600;cursor:pointer}
.sel-bar .sb-add{background:#fff;color:var(--acc)}.sel-bar .sb-clr{background:rgba(255,255,255,.2);color:#fff}

/* ── Repo browser items ── */
.rb-item{display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:3px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rs);cursor:pointer;transition:all .12s}
.rb-item:active{transform:scale(.98)}.rb-item.selected{border-color:var(--acc);background:rgba(108,92,231,.08)}
.rb-item .chk{width:20px;height:20px;border-radius:5px;border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.rb-item.selected .chk{background:var(--acc);border-color:var(--acc)}.rb-item.selected .chk svg{display:block}
.rb-item .chk svg{width:12px;height:12px;color:#fff;display:none}
.rb-item .rb-th{width:32px;height:32px;border-radius:7px;background:var(--acc-s);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.rb-item .rb-th img{width:100%;height:100%;object-fit:cover}.rb-item .rb-th svg{width:14px;height:14px;color:var(--acc)}
.rb-item .rb-info{flex:1;min-width:0}.rb-item .rb-info .rb-nm{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-item .rb-info .rb-mt{font-size:9px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Repo cards */
.repo-card{display:flex;align-items:center;gap:10px;padding:12px;margin-bottom:5px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:all .15s}
.repo-card:active{transform:scale(.98)}
.repo-card .rc-icon{width:42px;height:42px;border-radius:10px;background:var(--acc-s);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.repo-card .rc-icon svg{width:20px;height:20px;color:var(--acc)}
.repo-card .rc-info{flex:1;min-width:0}.repo-card .rc-info .rc-name{font-size:13px;font-weight:600;margin-bottom:1px}.repo-card .rc-info .rc-meta{font-size:10px;color:var(--t3)}
.repo-card .rc-del{width:28px;height:28px;border-radius:7px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--t3)}
.repo-card .rc-del:hover{background:var(--red-s);color:var(--red)}.repo-card .rc-del svg{width:13px;height:13px}

/* ── Modals ── */
.mo{display:none;position:fixed;inset:0;background:var(--ov);z-index:200;align-items:flex-end;justify-content:center}
.mo.on{display:flex}
.mo .mc{width:100%;max-width:480px;max-height:92vh;overflow-y:auto;background:var(--bg4);border-radius:16px 16px 0 0;padding:20px 18px 26px;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mo h2{font-size:16px;font-weight:600;margin-bottom:14px}
.mo label{display:block;font-size:9px;font-weight:600;color:var(--t2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.mo input,.mo textarea{width:100%;padding:9px 10px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);font-size:12px;outline:none;margin-bottom:10px}
.mo textarea{font-family:monospace;font-size:10px;min-height:50px;resize:vertical}
.mo input:focus,.mo textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-s)}
.mo .row{display:flex;gap:6px}.mo .row>div{flex:1}
.mo .ma{display:flex;gap:6px;margin-top:4px}
.mo .ma button{flex:1;padding:11px;border-radius:var(--rs);font-size:12px;font-weight:600;border:none;cursor:pointer}
.bc{background:var(--bg2);color:var(--t2);border:1px solid var(--brd)!important}
.bs{background:var(--acc);color:#fff}
.iz{border:2px dashed var(--brd);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.iz:hover{border-color:var(--acc)}.iz p{font-size:11px;color:var(--t2);margin-bottom:3px}.iz .h{font-size:9px;color:var(--t3)}.iz input[type=file]{display:none}
.jp{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rs);padding:8px;margin-bottom:10px;max-height:100px;overflow-y:auto;font-family:monospace;font-size:9px;color:var(--grn);display:none}
.is{background:var(--acc-s);border-radius:var(--rs);padding:7px 10px;margin-bottom:10px;font-size:11px;color:var(--acc);display:none}
.co{display:none;position:fixed;inset:0;background:var(--ov);z-index:250;align-items:center;justify-content:center}
.co.on{display:flex}
.cb{background:var(--bg4);border-radius:var(--r);padding:20px;width:260px;text-align:center}
.cb h3{font-size:14px;margin-bottom:5px}.cb p{font-size:11px;color:var(--t2);margin-bottom:14px}
.cb .bs2{display:flex;gap:6px}.cb .bs2 button{flex:1;padding:10px;border-radius:var(--rs);font-size:11px;font-weight:600;border:none;cursor:pointer}
.toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg4);color:var(--t1);padding:8px 16px;border-radius:20px;font-size:11px;border:1px solid var(--brd);box-shadow:var(--sh);opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.cnt{font-size:9px;color:var(--t3);background:var(--bg2);padding:2px 7px;border-radius:10px;border:1px solid var(--brd);font-family:monospace}

/* Player (web fallback) */
#player-screen{background:#000}
.pc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
.pc video,.pc iframe{width:100%;height:100%;border:none}
.po{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;justify-content:space-between;opacity:0;transition:opacity .3s;pointer-events:none}
.po.vis{opacity:1;pointer-events:auto}
.po-top{display:flex;align-items:center;gap:10px;padding:40px 16px 14px;background:linear-gradient(180deg,rgba(0,0,0,.88) 0%,transparent 100%)}
.po-top .bbk{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer}
.po-top .bbk:active{transform:scale(.9)}.po-top .bbk svg{width:16px;height:16px;color:#fff}
.po-top .np{flex:1;min-width:0}.po-top .np .lb{font-size:8px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px}
.po-top .np .tt{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.po-ctr{display:flex;align-items:center;justify-content:center;gap:28px}
.po-ctr button{border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.po-ctr .sk{width:48px;height:48px;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12)}
.po-ctr .sk svg{width:16px;height:16px;color:#fff}.po-ctr .sk:active{transform:scale(.9)}
.po-ctr .pp{width:64px;height:64px;background:var(--acc);box-shadow:0 4px 18px var(--acc-g)}
.po-ctr .pp svg{width:24px;height:24px;color:#fff}.po-ctr .pp:active{transform:scale(.9)}
.po-bot{padding:12px 16px 28px;background:linear-gradient(0deg,rgba(0,0,0,.88) 0%,transparent 100%)}
.po-bot .ui{font-family:monospace;font-size:8px;color:rgba(255,255,255,.2);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ld{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--acc);border-radius:50%;animation:spn .8s linear infinite}
@keyframes spn{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
<div class="app-content">

<!-- ═══ LIBRARY ═══ -->
<div id="lib-screen" class="screen active">
  <div class="hdr"><h1>StreamVault</h1><div class="hdr-r"><span class="tag">b7</span>
    <button class="ib" id="btn-imp" title="Import"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
    <button class="ib" id="btn-exp" title="Export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
  </div></div>
  <div class="sbar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="lib-search" placeholder="Search playlist…"></div>
  <div class="pills" id="lib-pills"></div>
  <div class="list" id="lib-list"></div>
  <div class="fab-g"><button class="fab" id="fab-add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>
</div>

<!-- ═══ REPOS ═══ -->
<div id="repo-screen" class="screen">
  <div class="hdr"><h1>Repositories</h1><div class="hdr-r"><span class="cnt" id="repo-cnt">0</span></div></div>
  <div class="list" id="repo-list" style="padding-top:6px"></div>
  <div class="fab-g"><button class="fab" id="fab-repo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>
</div>

<!-- ═══ REPO BROWSER ═══ -->
<div id="browse-screen" class="screen">
  <div class="hdr"><button class="ib" id="browse-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button><h1 id="browse-title" style="flex:1;margin-left:8px;font-size:16px">Repo</h1><span class="cnt" id="browse-cnt">0</span></div>
  <div class="sbar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="browse-search" placeholder="Search…"></div>
  <div class="filter-bar" id="fbar">
    <span class="flbl">Region:</span><select class="fsel" id="f-reg"><option>All</option></select>
    <span class="flbl">Genre:</span><select class="fsel" id="f-gen"><option>All</option></select>
  </div>
  <div class="sel-bar" id="sel-bar"><span class="sl" id="sel-cnt">0</span><div class="sr"><button class="sb-clr" id="sel-all">All</button><button class="sb-clr" id="sel-none">Clear</button><button class="sb-add" id="sel-add">Add to Playlist</button></div></div>
  <div class="list" id="browse-list"></div>
</div>

<!-- ═══ PLAYER (web fallback) ═══ -->
<div id="player-screen" class="screen">
  <div class="pc" id="pc"></div><div class="ld" id="ld"><div class="sp"></div></div>
  <div class="po" id="po">
    <div class="po-top"><button class="bbk" id="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button><div class="np"><div class="lb">Now Playing</div><div class="tt" id="p-title">—</div></div></div>
    <div class="po-ctr"><button class="sk" id="prev-btn"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg></button><button class="pp" id="pp-btn"><svg id="ic-pa" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><svg id="ic-pl" viewBox="0 0 24 24" fill="currentColor" style="display:none"><polygon points="5 3 19 12 5 21"/></svg></button><button class="sk" id="next-btn"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg></button></div>
    <div class="po-bot"><div class="ui" id="p-url">—</div></div>
  </div>
</div>

</div>
<div class="bottom-nav" id="bnav">
  <div class="nav-item active" data-tab="lib-screen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span>Library</span></div>
  <div class="nav-item" data-tab="repo-screen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><span>Repos</span></div>
</div>
</div>

<!-- Modals (same as build 6 but compact) -->
<div class="mo" id="mo-edit"><div class="mc"><h2 id="mo-edit-t">Add Stream</h2><label>Title *</label><input id="in-name" placeholder="Stream name"><label>Stream URL *</label><textarea id="in-url" placeholder="https://..."></textarea><div class="row"><div><label>Category</label><input id="in-cat" placeholder="TV, News…"></div><div><label>EPG Title</label><input id="in-epg" placeholder="EPG name"></div></div><label>Icon URL</label><input id="in-icon" placeholder="https://logo.png"><label>EPG Link</label><input id="in-epgl" placeholder="https://epg.xml"><div class="ma"><button class="bc" id="ed-cancel">Cancel</button><button class="bs" id="ed-save">Save</button></div></div></div>

<div class="mo" id="mo-repo"><div class="mc"><h2>Add Repository</h2><label>Name *</label><input id="repo-name" placeholder="My IPTV Provider"><div class="iz" id="repo-zone"><p>Choose large .m3u file</p><div class="h">.m3u or .m3u8</div><input type="file" id="repo-file" accept=".m3u,.m3u8"></div><label>Or paste M3U</label><textarea id="repo-text" placeholder="#EXTM3U…" style="min-height:70px"></textarea><div class="jp" id="repo-prev"></div><div class="is" id="repo-stats"></div><div class="ma"><button class="bc" id="repo-cancel">Cancel</button><button class="bs" id="repo-save">Add Repository</button></div></div></div>
<div class="co" id="co"><div class="cb"><h3 id="co-t">Delete?</h3><p id="co-m">Cannot be undone.</p><div class="bs2"><button class="bc" id="co-no">Cancel</button><button style="background:var(--red);color:#fff" id="co-yes">Delete</button></div></div></div>
<div class="toast" id="toast"></div>

<script>
const V='3.2.0',B=7,SK='sv_media_v2',RK='sv_repos';
let items=[],repos=[],editId=null,delId=null,delType=null,curIdx=-1,hlsI=null;
let activeCat='All',overlayT=null,pendingImp=null;
let browseRepo=null,browseSelected=new Set(),browseRegion='All',browseGenre='All';

// Failover priority: no tag > (F) > (H) > (A) > (S)
const TAG_PRIORITY=['','F','H','A','S'];

function save(){try{localStorage.setItem(SK,JSON.stringify(items))}catch(e){}}
function load(){try{let d=localStorage.getItem(SK);if(!d)d=localStorage.getItem('streamvault_media_v2')||localStorage.getItem('streamvault_media');if(d){items=JSON.parse(d);items.forEach(m=>{m.icon=m.icon||'';m.epgLink=m.epgLink||'';m.epgTitle=m.epgTitle||'';m.region=m.region||'';m.tags=m.tags||[];m.baseName=m.baseName||extractBaseName(m.title)})}}catch(e){}}
function saveRepos(){try{localStorage.setItem(RK,JSON.stringify(repos))}catch(e){}}
function loadRepos(){try{let d=localStorage.getItem(RK);if(d)repos=JSON.parse(d)}catch(e){}}

const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function gid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6)}

// ─── M3U Parser ───
function parseM3U(text){
  const lines=text.split(/\r?\n/),out=[];let cur=null;
  for(const raw of lines){const l=raw.trim();
    if(!l||l==='#EXTM3U')continue;
    if(l.startsWith('#EXTINF:')){
      cur={name:'',url:'',category:'',icon:'',epgTitle:'',epgLink:'',region:'',tags:[],baseName:''};
      cur.icon=xA(l,'tvg-logo');cur.epgTitle=xA(l,'tvg-id')||xA(l,'tvg-name');
      cur.category=xA(l,'group-title');cur.epgLink=xA(l,'tvg-url');
      const ci=l.lastIndexOf(','),dn=ci>-1?l.substring(ci+1).trim():'',tvgN=xA(l,'tvg-name');
      cur.name=tvgN||dn||'Untitled';
      const rm=cur.name.match(/^([A-Z]{2})\s*[:|-]\s*(.+)/);
      if(rm){cur.region=rm[1];cur.name=rm[2].trim()}
      const tm=cur.name.match(/\(([A-Z])\)\s*$/);
      if(tm){cur.tags=[tm[1]];cur.name=cur.name.replace(/\s*\([A-Z]\)\s*$/,'').trim()}
      cur.baseName=extractBaseName(cur.name);
    }else if(l.startsWith('#'))continue;
    else if(l.match(/^https?:\/\//)||l.match(/^rtmp/)){
      if(cur){cur.url=l;out.push(cur);cur=null}
      else out.push({name:l.split('/').pop()||l,url:l,category:'',icon:'',epgTitle:'',epgLink:'',region:'',tags:[],baseName:''});
    }
  }
  return out;
}
function xA(l,a){const m=l.match(new RegExp(a+'=["\']([^"\']*)["\']','i'));return m?m[1].trim():''}
function isM3U(t){const s=t.trim();return s.startsWith('#EXTM3U')||s.startsWith('#EXTINF:')}

/** Extract a normalized base name for variant matching: "CNN HD (S)" → "cnn hd" */
function extractBaseName(name){
  return name.replace(/\s*\([A-Z]\)\s*$/,'').replace(/\s*(HD|SD|FHD|4K|UHD)\s*/gi,'').trim().toLowerCase();
}

function extractUrl(raw){try{const u=new URL(raw);if(u.hostname.includes('webplayer.online')){const p=u.searchParams.get('url');if(p)return p.replace(/@top$/,'')}}catch(e){}return raw}

/** Build ordered list of alternative URLs for a stream (for failover) */
function buildFailoverList(item){
  // Find all streams with same baseName and region from repos + playlist
  const base=item.baseName||extractBaseName(item.title);
  const region=item.region||'';
  let candidates=[];

  // Search playlist
  items.forEach(m=>{
    const mb=m.baseName||extractBaseName(m.title);
    if(mb===base&&m.url!==item.url)candidates.push(m);
  });

  // Search all repos
  repos.forEach(r=>{
    r.streams.forEach(s=>{
      const sb=s.baseName||extractBaseName(s.name);
      if(sb===base&&s.url!==item.url&&!candidates.some(c=>c.url===s.url)){
        candidates.push({title:s.name,url:s.url,region:s.region||'',tags:s.tags||[],category:s.category});
      }
    });
  });

  // Sort by priority: same region first, then tag priority
  candidates.sort((a,b)=>{
    const ar=a.region||'',br=b.region||'';
    // Same region as original gets priority
    const aRegMatch=(ar===region)?0:1;
    const bRegMatch=(br===region)?0:1;
    if(aRegMatch!==bRegMatch)return aRegMatch-bRegMatch;
    // Then by tag priority
    const aTag=(a.tags&&a.tags[0])||'';
    const bTag=(b.tags&&b.tags[0])||'';
    return TAG_PRIORITY.indexOf(aTag)-TAG_PRIORITY.indexOf(bTag);
  });

  // Build final list: original first, then alternatives
  const result=[{url:extractUrl(item.url),title:item.title,region:region,tag:''}];
  candidates.forEach(c=>{
    result.push({url:extractUrl(c.url),title:c.title||c.name||'',region:c.region||'',tag:(c.tags&&c.tags[0])||''});
  });
  return result;
}

// ─── Navigation ───
function showTab(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.tab===id));
  $('bnav').style.display=(id==='player-screen'||id==='browse-screen')?'none':'flex';
}
document.querySelectorAll('.nav-item').forEach(n=>{n.onclick=()=>showTab(n.dataset.tab)});

// ─── Library ───
function getCats(){const c=new Set();items.forEach(m=>{if(m.category)c.add(m.category)});return['All',...[...c].sort()]}
function getFiltered(){const q=$('lib-search').value.toLowerCase().trim();return items.filter(m=>{const mc=activeCat==='All'||m.category===activeCat;const ms=!q||m.title.toLowerCase().includes(q)||(m.epgTitle&&m.epgTitle.toLowerCase().includes(q));return mc&&ms})}
function renderCats(){const c=getCats();$('lib-pills').innerHTML=c.length<=1?'':c.map(x=>`<div class="pill${x===activeCat?' on':''}" data-c="${esc(x)}">${esc(x)}</div>`).join('');$('lib-pills').querySelectorAll('.pill').forEach(p=>p.onclick=()=>{activeCat=p.dataset.c;renderCats();renderLib()})}
function renderLib(){
  const f=getFiltered();
  if(!f.length){$('lib-list').innerHTML=`<div class="empty"><div class="ew"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></div><h3>No streams</h3><p>Add streams or browse Repositories</p></div>`;return}
  $('lib-list').innerHTML=f.map((m,i)=>{
    const th=m.icon?`<img src="${esc(m.icon)}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><svg style="display:none" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>`:`<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>`;
    const cb=m.category?`<span class="cb">${esc(m.category)}</span>`:'';
    const rb=m.region?`<span class="rb">${esc(m.region)}</span>`:'';
    const alts=buildFailoverList(m).length-1;
    const vb=alts>0?`<span class="vb">${alts} alt${alts>1?'s':''}</span>`:'';
    return`<div class="item" style="animation-delay:${i*.015}s" onclick="playIt('${m.id}')"><div class="th">${th}</div><div class="nfo"><div class="nm">${esc(m.title)}</div><div class="mt">${rb}${cb}${vb}</div></div><div class="acts"><button class="eb" onclick="event.stopPropagation();openEd('${m.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="db" onclick="event.stopPropagation();confirmDel('${m.id}','item')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div></div>`}).join('');
}
$('lib-search').oninput=renderLib;

// ─── Add/Edit/Delete ───
$('fab-add').onclick=()=>{editId=null;$('mo-edit-t').textContent='Add Stream';['in-name','in-url','in-cat','in-epg','in-icon','in-epgl'].forEach(x=>$(x).value='');$('mo-edit').classList.add('on')};
window.openEd=id=>{const m=items.find(x=>x.id===id);if(!m)return;editId=id;$('mo-edit-t').textContent='Edit';$('in-name').value=m.title;$('in-url').value=m.url;$('in-cat').value=m.category||'';$('in-epg').value=m.epgTitle||'';$('in-icon').value=m.icon||'';$('in-epgl').value=m.epgLink||'';$('mo-edit').classList.add('on')};
$('ed-cancel').onclick=()=>$('mo-edit').classList.remove('on');
$('mo-edit').onclick=e=>{if(e.target===$('mo-edit'))$('mo-edit').classList.remove('on')};
$('ed-save').onclick=()=>{const t=$('in-name').value.trim(),u=$('in-url').value.trim();if(!t||!u){toast('Title & URL required');return}const d={title:t,url:u,category:$('in-cat').value.trim(),icon:$('in-icon').value.trim(),epgLink:$('in-epgl').value.trim(),epgTitle:$('in-epg').value.trim(),baseName:extractBaseName(t)};if(editId){const m=items.find(x=>x.id===editId);if(m)Object.assign(m,d);toast('Updated')}else{items.push({id:gid(),...d,region:'',tags:[],added:Date.now()});toast('Added')}save();$('mo-edit').classList.remove('on');renderCats();renderLib()};
window.confirmDel=(id,type)=>{delId=id;delType=type;$('co').classList.add('on')};
$('co-no').onclick=()=>$('co').classList.remove('on');
$('co-yes').onclick=()=>{if(delType==='item'){items=items.filter(m=>m.id!==delId);save();renderCats();renderLib()}else if(delType==='repo'){repos=repos.filter(r=>r.id!==delId);saveRepos();renderRepos()}$('co').classList.remove('on');toast('Deleted')};

// ─── Import ───
$('btn-imp').onclick=()=>{pendingImp=null;$('imp-text').value='';$('imp-prev').style.display='none';$('imp-stats').style.display='none';$('mo-imp').classList.add('on')};
$('imp-cancel').onclick=()=>$('mo-imp').classList.remove('on');
$('imp-zone').onclick=()=>$('imp-file').click();
$('imp-file').onchange=e=>{if(e.target.files[0]){const r=new FileReader();r.onload=ev=>{$('imp-text').value=ev.target.result;valImp(ev.target.result)};r.readAsText(e.target.files[0])}};
$('imp-text').oninput=()=>valImp($('imp-text').value);
function valImp(t){t=t.trim();if(!t){pendingImp=null;return}try{let v,f;if(isM3U(t)){f='M3U';v=parseM3U(t).filter(d=>d.name&&d.url)}else{f='JSON';let d=JSON.parse(t);if(!Array.isArray(d))d=[d];v=d.filter(x=>(x.name||x.title)&&x.url).map(x=>({name:x.name||x.title,url:x.url,category:x.category||'',icon:x.icon||'',epgLink:x.epgLink||'',epgTitle:x.epgTitle||'',region:'',tags:[],baseName:extractBaseName(x.name||x.title)}))}if(!v.length)throw new Error('No streams');pendingImp=v;$('imp-prev').style.display='block';$('imp-prev').style.color='var(--grn)';$('imp-prev').textContent=`✓ ${v.length} from ${f}`;$('imp-stats').style.display='block';$('imp-stats').textContent=v.length+' ready'}catch(e){pendingImp=null;$('imp-prev').style.display='block';$('imp-prev').style.color='var(--red)';$('imp-prev').textContent='✗ '+e.message;$('imp-stats').style.display='none'}}
$('imp-save').onclick=()=>{if(!pendingImp){valImp($('imp-text').value);if(!pendingImp){toast('No data');return}}let a=0,s=0;pendingImp.forEach(d=>{if(items.some(m=>m.url===d.url)){s++;return}items.push({id:gid(),title:d.name,url:d.url,category:d.category,icon:d.icon,epgLink:d.epgLink,epgTitle:d.epgTitle,region:d.region||'',tags:d.tags||[],baseName:d.baseName||extractBaseName(d.name),added:Date.now()});a++});save();$('mo-imp').classList.remove('on');renderCats();renderLib();toast(`Imported ${a}${s?' · '+s+' dupes':''}`)};

// ─── Export ───
$('btn-exp').onclick=()=>{if(!items.length){toast('Empty');return}const c=confirm('OK=JSON / Cancel=M3U');if(c){dl(JSON.stringify(items.map(m=>({name:m.title,url:m.url,category:m.category||undefined,icon:m.icon||undefined,epgTitle:m.epgTitle||undefined})),null,2),'application/json','sv-'+ds()+'.json')}else{let o='#EXTM3U\n';items.forEach(m=>{let e='#EXTINF:-1';if(m.epgTitle)e+=` tvg-id="${m.epgTitle}"`;if(m.icon)e+=` tvg-logo="${m.icon}"`;if(m.category)e+=` group-title="${m.category}"`;e+=`,${m.title}`;o+=e+'\n'+m.url+'\n'});dl(o,'audio/x-mpegurl','sv-'+ds()+'.m3u')}toast('Exported')};
function dl(c,t,n){const b=new Blob([c],{type:t}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;a.click()}
function ds(){return new Date().toISOString().slice(0,10)}

// ═══ REPOSITORIES ═══
$('fab-repo').onclick=()=>{$('repo-name').value='';$('repo-text').value='';$('repo-prev').style.display='none';$('repo-stats').style.display='none';$('mo-repo').classList.add('on')};
$('repo-cancel').onclick=()=>$('mo-repo').classList.remove('on');
$('repo-zone').onclick=()=>$('repo-file').click();
$('repo-file').onchange=e=>{if(e.target.files[0]){const f=e.target.files[0];if(!$('repo-name').value.trim())$('repo-name').value=f.name.replace(/\.(m3u8?|json)$/i,'');const r=new FileReader();r.onload=ev=>{$('repo-text').value=ev.target.result;valRepo(ev.target.result)};r.readAsText(f)}};
$('repo-text').oninput=()=>valRepo($('repo-text').value);
function valRepo(t){t=t.trim();if(!t)return;try{const s=parseM3U(t).filter(d=>d.name&&d.url);if(!s.length)throw new Error('No streams');const regs=new Set(s.map(x=>x.region).filter(Boolean));$('repo-prev').style.display='block';$('repo-prev').style.color='var(--grn)';$('repo-prev').textContent=`✓ ${s.length} streams · ${regs.size} regions`;$('repo-stats').style.display='block';$('repo-stats').textContent=s.length+' ready'}catch(e){$('repo-prev').style.display='block';$('repo-prev').style.color='var(--red)';$('repo-prev').textContent='✗ '+e.message}}
$('repo-save').onclick=()=>{const n=$('repo-name').value.trim(),t=$('repo-text').value.trim();if(!n){toast('Name needed');return}if(!t){toast('Upload M3U');return}const s=parseM3U(t).filter(d=>d.name&&d.url);if(!s.length){toast('No streams');return}repos.push({id:gid(),name:n,streams:s,addedAt:Date.now()});saveRepos();$('mo-repo').classList.remove('on');renderRepos();toast(`"${n}" · ${s.length} streams`)};
function renderRepos(){$('repo-cnt').textContent=repos.length;if(!repos.length){$('repo-list').innerHTML=`<div class="empty"><div class="ew"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></div><h3>No repos</h3><p>Tap + to add a large M3U as a browsable source</p></div>`;return}
$('repo-list').innerHTML=repos.map(r=>{const regs=new Set(r.streams.map(s=>s.region).filter(Boolean));return`<div class="repo-card" onclick="openRepo('${r.id}')"><div class="rc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></div><div class="rc-info"><div class="rc-name">${esc(r.name)}</div><div class="rc-meta">${r.streams.length} streams · ${regs.size} regions</div></div><button class="rc-del" onclick="event.stopPropagation();confirmDel('${r.id}','repo')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div>`}).join('')}

// ═══ REPO BROWSER (compact filters) ═══
window.openRepo=id=>{const r=repos.find(x=>x.id===id);if(!r)return;browseRepo=r;browseSelected=new Set();browseRegion='All';browseGenre='All';$('browse-title').textContent=r.name;$('browse-search').value='';showTab('browse-screen');buildDropdowns();renderBrowse()};
$('browse-back').onclick=()=>showTab('repo-screen');
function buildDropdowns(){
  if(!browseRepo)return;
  const regs=['All',...new Set(browseRepo.streams.map(s=>s.region).filter(Boolean))].sort();
  const gens=['All',...new Set(browseRepo.streams.map(s=>s.category).filter(Boolean))].sort();
  $('f-reg').innerHTML=regs.map(r=>`<option${r===browseRegion?' selected':''}>${r}</option>`).join('');
  $('f-gen').innerHTML=gens.map(g=>`<option${g===browseGenre?' selected':''}>${g}</option>`).join('');
  $('f-reg').className='fsel'+(browseRegion!=='All'?' active':'');
  $('f-gen').className='fsel'+(browseGenre!=='All'?' active':'');
}
$('f-reg').onchange=e=>{browseRegion=e.target.value;$('f-reg').className='fsel'+(browseRegion!=='All'?' active':'');renderBrowse()};
$('f-gen').onchange=e=>{browseGenre=e.target.value;$('f-gen').className='fsel'+(browseGenre!=='All'?' active':'');renderBrowse()};
function getBF(){if(!browseRepo)return[];const q=$('browse-search').value.toLowerCase().trim();return browseRepo.streams.filter(s=>{return(browseRegion==='All'||s.region===browseRegion)&&(browseGenre==='All'||s.category===browseGenre)&&(!q||s.name.toLowerCase().includes(q)||(s.category&&s.category.toLowerCase().includes(q)))})}
function renderBrowse(){
  const f=getBF(),eu=new Set(items.map(m=>m.url));
  $('browse-cnt').textContent=f.length+'/'+(browseRepo?browseRepo.streams.length:0);
  const sb=$('sel-bar');if(browseSelected.size>0){sb.classList.add('on');$('sel-cnt').textContent=browseSelected.size+' selected'}else sb.classList.remove('on');
  if(!f.length){$('browse-list').innerHTML=`<div class="empty"><div class="ew"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><h3>No matches</h3><p>Change filters or search</p></div>`;return}
  $('browse-list').innerHTML=f.map((s,i)=>{
    const k=s.url,sel=browseSelected.has(k),ex=eu.has(k);
    const th=s.icon?`<img src="${esc(s.icon)}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><svg style="display:none" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>`:`<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>`;
    const rb=s.region?`<span class="rb">${esc(s.region)}</span>`:'';const cb=s.category?`<span class="cb">${esc(s.category)}</span>`:'';
    return`<div class="rb-item${sel?' selected':''}" data-url="${esc(k)}" onclick="tSel(this)"><div class="chk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><div class="rb-th">${th}</div><div class="rb-info"><div class="rb-nm">${esc(s.name)}${ex?'<span style="color:var(--grn);font-size:8px;margin-left:3px">✓</span>':''}</div><div class="rb-mt">${rb}${cb}</div></div></div>`}).join('');
}
window.tSel=el=>{const u=el.dataset.url;if(browseSelected.has(u)){browseSelected.delete(u);el.classList.remove('selected')}else{browseSelected.add(u);el.classList.add('selected')}const sb=$('sel-bar');if(browseSelected.size>0){sb.classList.add('on');$('sel-cnt').textContent=browseSelected.size+' selected'}else sb.classList.remove('on')};
$('browse-search').oninput=renderBrowse;
$('sel-all').onclick=()=>{getBF().forEach(s=>browseSelected.add(s.url));renderBrowse()};
$('sel-none').onclick=()=>{browseSelected.clear();renderBrowse()};
$('sel-add').onclick=()=>{if(!browseRepo||!browseSelected.size)return;let a=0,s=0;browseRepo.streams.filter(x=>browseSelected.has(x.url)).forEach(d=>{if(items.some(m=>m.url===d.url)){s++;return}items.push({id:gid(),title:d.name,url:d.url,category:d.category,icon:d.icon,epgLink:d.epgLink,epgTitle:d.epgTitle,region:d.region,tags:d.tags||[],baseName:d.baseName||extractBaseName(d.name),added:Date.now()});a++});save();browseSelected.clear();renderBrowse();renderCats();renderLib();toast(`Added ${a}${s?' · '+s+' dupes':''}`)};

// ═══ PLAYER ═══
function destroyP(){if(hlsI){hlsI.destroy();hlsI=null}$('pc').innerHTML='';$('ld').style.display='flex'}
window.playIt=id=>{
  const idx=items.findIndex(m=>m.id===id);if(idx===-1)return;curIdx=idx;
  const m=items[idx];
  const failoverList=buildFailoverList(m);
  const cat=[m.category,m.epgTitle].filter(Boolean).join(' · ');

  // Native ExoPlayer with failover
  if(window.NativePlayer&&window.NativePlayer.isAvailable()){
    const json=JSON.stringify(failoverList);
    window.NativePlayer.playWithFailover(json,m.title||'Stream',cat);
    return;
  }
  // Fallback: basic web player (no failover)
  showTab('player-screen');$('p-title').textContent=m.title;$('p-url').textContent=m.url;destroyP();
  const url=extractUrl(m.url);
  if(Hls.isSupported()){const v=document.createElement('video');v.setAttribute('playsinline','');v.setAttribute('autoplay','');v.style.cssText='width:100%;height:100%;background:#000';$('pc').appendChild(v);hlsI=new Hls({enableWorker:true});hlsI.attachMedia(v);hlsI.on(Hls.Events.MEDIA_ATTACHED,()=>hlsI.loadSource(url));hlsI.on(Hls.Events.MANIFEST_PARSED,()=>{$('ld').style.display='none';v.play().catch(()=>{})});hlsI.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal){$('pc').innerHTML=`<iframe src="${esc(m.url)}" style="width:100%;height:100%;border:none" allowfullscreen></iframe>`;$('ld').style.display='none'}})}
  else{$('pc').innerHTML=`<iframe src="${esc(m.url)}" style="width:100%;height:100%;border:none" allowfullscreen></iframe>`;setTimeout(()=>$('ld').style.display='none',3000)}
  showOvr();
};
function showOvr(){$('po').classList.add('vis');clearTimeout(overlayT);overlayT=setTimeout(()=>$('po').classList.remove('vis'),4500)}
$('player-screen').onclick=e=>{if(!e.target.closest('button')){$('po').classList.contains('vis')?($('po').classList.remove('vis'),clearTimeout(overlayT)):showOvr()}};
$('back-btn').onclick=e=>{e.stopPropagation();destroyP();showTab('lib-screen')};
$('pp-btn').onclick=e=>{e.stopPropagation();const v=$('pc').querySelector('video');if(!v)return;if(v.paused){v.play();$('ic-pl').style.display='none';$('ic-pa').style.display='block'}else{v.pause();$('ic-pl').style.display='block';$('ic-pa').style.display='none'}showOvr()};
$('prev-btn').onclick=e=>{e.stopPropagation();if(!items.length)return;curIdx=(curIdx-1+items.length)%items.length;playIt(items[curIdx].id)};
$('next-btn').onclick=e=>{e.stopPropagation();if(!items.length)return;curIdx=(curIdx+1)%items.length;playIt(items[curIdx].id)};
window.addEventListener('popstate',()=>{if($('player-screen').classList.contains('active')){destroyP();showTab('lib-screen')}else if($('browse-screen').classList.contains('active'))showTab('repo-screen')});

// ─── Init ───
load();loadRepos();renderCats();renderLib();renderRepos();
</script>
</body>
