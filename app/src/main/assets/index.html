<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>StreamVault</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#16161f;
--acc:#6c5ce7;--acc-g:rgba(108,92,231,.35);--acc-s:rgba(108,92,231,.12);
--t1:#e8e6f0;--t2:#8a879a;--t3:#55526a;
--red:#ff4757;--red-s:rgba(255,71,87,.12);--grn:#2ed573;
--brd:rgba(255,255,255,.06);--ov:rgba(6,6,12,.92);
--r:14px;--rs:8px;--sh:0 8px 32px rgba(0,0,0,.4);
}
html,body{height:100%;width:100%;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t1);overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}

/* ── Nav ── */
.app{display:flex;flex-direction:column;height:100%}
.app-content{flex:1;position:relative;overflow:hidden}
.screen{display:none;position:absolute;inset:0;flex-direction:column}
.screen.active{display:flex}
.bottom-nav{display:flex;background:var(--bg2);border-top:1px solid var(--brd);padding:6px 0 env(safe-area-inset-bottom,8px);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer;color:var(--t3);transition:color .2s}
.nav-item.active{color:var(--acc)}
.nav-item svg{width:20px;height:20px}
.nav-item span{font-size:10px;font-weight:600}

/* ── Shared ── */
.hdr{padding:48px 20px 10px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--t1),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-r{display:flex;align-items:center;gap:6px}
.tag{font-size:10px;color:var(--t3);background:var(--bg2);padding:3px 8px;border-radius:12px;border:1px solid var(--brd);font-family:monospace}
.ib{width:34px;height:34px;border-radius:10px;background:var(--bg2);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);transition:all .2s}
.ib:active{transform:scale(.92)}.ib:hover{border-color:var(--acc);color:var(--acc)}
.ib svg{width:16px;height:16px}
.sbar{margin:8px 20px 8px;position:relative}
.sbar input{width:100%;padding:11px 14px 11px 40px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);color:var(--t1);font-size:13px;outline:none;transition:border-color .2s}
.sbar input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-s)}
.sbar input::placeholder{color:var(--t3)}
.sbar svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--t3)}
.pills{display:flex;gap:6px;padding:4px 20px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
.pills::-webkit-scrollbar{display:none}
.pill{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;background:var(--bg2);border:1px solid var(--brd);color:var(--t2);transition:all .2s;flex-shrink:0}
.pill.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.list{flex:1;overflow-y:auto;padding:0 20px 100px;-webkit-overflow-scrolling:touch}
.list::-webkit-scrollbar{display:none}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 30px;text-align:center}
.empty .ew{width:64px;height:64px;border-radius:50%;background:var(--acc-s);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.empty .ew svg{width:28px;height:28px;color:var(--acc)}
.empty h3{font-size:16px;font-weight:600;margin-bottom:4px}
.empty p{font-size:12px;color:var(--t2);line-height:1.5;max-width:260px}
.item{display:flex;align-items:center;gap:10px;padding:11px;margin-bottom:5px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:all .15s;animation:si .2s ease forwards;opacity:0;transform:translateY(6px)}
@keyframes si{to{opacity:1;transform:translateY(0)}}
.item:active{transform:scale(.98)}
.item .th{width:42px;height:42px;border-radius:9px;background:linear-gradient(135deg,var(--acc-s),rgba(108,92,231,.25));display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.item .th img{width:100%;height:100%;object-fit:cover}
.item .th svg{width:18px;height:18px;color:var(--acc)}
.item .nfo{flex:1;min-width:0}
.item .nfo .nm{font-size:13px;font-weight:500;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .nfo .mt{font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .nfo .mt .cb{background:var(--acc-s);color:var(--acc);padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;margin-right:4px;text-transform:uppercase}
.item .nfo .mt .rb{background:rgba(46,213,115,.12);color:var(--grn);padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;margin-right:4px}
.item .acts{display:flex;gap:2px;flex-shrink:0}
.item .acts button{width:30px;height:30px;border-radius:7px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--t3);transition:all .2s}
.item .acts button svg{width:14px;height:14px}
.item .acts .eb:hover{background:var(--acc-s);color:var(--acc)}
.item .acts .db:hover{background:var(--red-s);color:var(--red)}

/* FAB */
.fab-g{position:fixed;bottom:70px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:50}
.fab{width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fab:active{transform:scale(.92)}
.fab svg{width:22px;height:22px;color:#fff}
.fab-p{background:var(--acc);box-shadow:0 4px 18px var(--acc-g)}
.fab-s{background:var(--bg4);border:1px solid var(--brd);width:40px;height:40px}
.fab-s svg{width:18px;height:18px;color:var(--t2)}

/* Modal */
.mo{display:none;position:fixed;inset:0;background:var(--ov);z-index:200;align-items:flex-end;justify-content:center}
.mo.on{display:flex}
.mo .mc{width:100%;max-width:480px;max-height:92vh;overflow-y:auto;background:var(--bg4);border-radius:18px 18px 0 0;padding:22px 20px 28px;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mo h2{font-size:17px;font-weight:600;margin-bottom:16px}
.mo label{display:block;font-size:10px;font-weight:600;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.mo input,.mo textarea{width:100%;padding:10px 11px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);font-size:13px;outline:none;margin-bottom:12px;transition:border-color .2s}
.mo textarea{font-family:monospace;font-size:11px;min-height:50px;resize:vertical}
.mo input:focus,.mo textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-s)}
.mo .row{display:flex;gap:8px}.mo .row>div{flex:1}
.mo .ma{display:flex;gap:8px;margin-top:4px}
.mo .ma button{flex:1;padding:12px;border-radius:var(--rs);font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.bc{background:var(--bg2);color:var(--t2);border:1px solid var(--brd)!important}
.bs{background:var(--acc);color:#fff}.bs:active{opacity:.85}

/* Import zone */
.iz{border:2px dashed var(--brd);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:12px;cursor:pointer;transition:border-color .2s}
.iz:hover,.iz.dv{border-color:var(--acc)}
.iz p{font-size:12px;color:var(--t2);margin-bottom:4px}
.iz .h{font-size:10px;color:var(--t3)}
.iz input[type=file]{display:none}
.jp{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rs);padding:10px;margin-bottom:12px;max-height:120px;overflow-y:auto;font-family:monospace;font-size:10px;color:var(--grn);display:none}
.is{background:var(--acc-s);border-radius:var(--rs);padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--acc);display:none}

/* Confirm */
.co{display:none;position:fixed;inset:0;background:var(--ov);z-index:250;align-items:center;justify-content:center}
.co.on{display:flex}
.cb{background:var(--bg4);border-radius:var(--r);padding:22px;width:280px;text-align:center;box-shadow:var(--sh)}
.cb h3{font-size:15px;margin-bottom:6px}.cb p{font-size:12px;color:var(--t2);margin-bottom:16px}
.cb .bs2{display:flex;gap:8px}
.cb .bs2 button{flex:1;padding:10px;border-radius:var(--rs);font-size:12px;font-weight:600;border:none;cursor:pointer}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);color:var(--t1);padding:9px 18px;border-radius:24px;font-size:12px;border:1px solid var(--brd);box-shadow:var(--sh);opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── REPO BROWSER ── */
.repo-card{display:flex;align-items:center;gap:12px;padding:14px;margin-bottom:6px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:all .15s}
.repo-card:active{transform:scale(.98)}
.repo-card .rc-icon{width:46px;height:46px;border-radius:12px;background:var(--acc-s);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.repo-card .rc-icon svg{width:22px;height:22px;color:var(--acc)}
.repo-card .rc-info{flex:1;min-width:0}
.repo-card .rc-info .rc-name{font-size:14px;font-weight:600;margin-bottom:2px}
.repo-card .rc-info .rc-meta{font-size:11px;color:var(--t3)}
.repo-card .rc-del{width:30px;height:30px;border-radius:7px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--t3);transition:all .2s}
.repo-card .rc-del:hover{background:var(--red-s);color:var(--red)}
.repo-card .rc-del svg{width:14px;height:14px}

/* Repo browser items with checkbox */
.rb-item{display:flex;align-items:center;gap:10px;padding:10px;margin-bottom:4px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rs);cursor:pointer;transition:all .15s}
.rb-item:active{transform:scale(.98)}
.rb-item.selected{border-color:var(--acc);background:rgba(108,92,231,.08)}
.rb-item .chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.rb-item.selected .chk{background:var(--acc);border-color:var(--acc)}
.rb-item.selected .chk svg{display:block}
.rb-item .chk svg{width:14px;height:14px;color:#fff;display:none}
.rb-item .rb-info{flex:1;min-width:0}
.rb-item .rb-info .rb-nm{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-item .rb-info .rb-mt{font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-item .rb-th{width:36px;height:36px;border-radius:8px;background:var(--acc-s);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.rb-item .rb-th img{width:100%;height:100%;object-fit:cover}
.rb-item .rb-th svg{width:16px;height:16px;color:var(--acc)}

/* Selection bar */
.sel-bar{display:none;padding:10px 20px;background:var(--acc);align-items:center;justify-content:space-between}
.sel-bar.on{display:flex}
.sel-bar .sl{font-size:13px;font-weight:600;color:#fff}
.sel-bar .sr{display:flex;gap:8px}
.sel-bar button{padding:7px 14px;border-radius:16px;border:none;font-size:11px;font-weight:600;cursor:pointer}
.sel-bar .sb-add{background:#fff;color:var(--acc)}
.sel-bar .sb-clr{background:rgba(255,255,255,.2);color:#fff}

/* Filter sections */
.filter-row{display:flex;gap:4px;padding:0 20px 6px;flex-wrap:wrap}
.filter-label{font-size:10px;color:var(--t3);padding:4px 0;font-weight:600;text-transform:uppercase;letter-spacing:.5px;width:100%}

/* Player screen (kept for web fallback) */
#player-screen{background:#000}
.pc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
.pc video,.pc iframe{width:100%;height:100%;border:none}
.po{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;justify-content:space-between;opacity:0;transition:opacity .3s;pointer-events:none}
.po.vis{opacity:1;pointer-events:auto}
.po-top{display:flex;align-items:center;gap:12px;padding:44px 18px 16px;background:linear-gradient(180deg,rgba(0,0,0,.88) 0%,transparent 100%)}
.po-top .bbk{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer}
.po-top .bbk:active{transform:scale(.9)}
.po-top .bbk svg{width:18px;height:18px;color:#fff}
.po-top .np{flex:1;min-width:0}
.po-top .np .lb{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px}
.po-top .np .tt{font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.po-ctr{display:flex;align-items:center;justify-content:center;gap:32px}
.po-ctr button{border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.po-ctr .sk{width:52px;height:52px;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12)}
.po-ctr .sk svg{width:18px;height:18px;color:#fff}.po-ctr .sk:active{transform:scale(.9)}
.po-ctr .pp{width:68px;height:68px;background:var(--acc);box-shadow:0 4px 20px var(--acc-g)}
.po-ctr .pp svg{width:26px;height:26px;color:#fff}.po-ctr .pp:active{transform:scale(.9)}
.po-bot{padding:14px 18px 32px;background:linear-gradient(0deg,rgba(0,0,0,.88) 0%,transparent 100%)}
.po-bot .ui{font-family:monospace;font-size:9px;color:rgba(255,255,255,.2);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ld{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5}
.sp{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--acc);border-radius:50%;animation:spn .8s linear infinite}
@keyframes spn{to{transform:rotate(360deg)}}

/* Stream count badge */
.cnt{font-size:10px;color:var(--t3);background:var(--bg2);padding:3px 8px;border-radius:10px;border:1px solid var(--brd);font-family:monospace}
</style>
</head>
<body>
<div class="app">
<div class="app-content">

<!-- ═══ LIBRARY SCREEN ═══ -->
<div id="lib-screen" class="screen active">
  <div class="hdr">
    <h1>StreamVault</h1>
    <div class="hdr-r">
      <span class="tag">b6</span>
      <button class="ib" id="btn-imp" title="Import"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
      <button class="ib" id="btn-exp" title="Export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
    </div>
  </div>
  <div class="sbar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="lib-search" placeholder="Search playlist…"></div>
  <div class="pills" id="lib-pills"></div>
  <div class="list" id="lib-list"></div>
  <div class="fab-g"><button class="fab fab-p" id="fab-add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>
</div>

<!-- ═══ REPOS SCREEN ═══ -->
<div id="repo-screen" class="screen">
  <div class="hdr">
    <h1>Repositories</h1>
    <div class="hdr-r"><span class="cnt" id="repo-cnt">0 repos</span></div>
  </div>
  <div class="list" id="repo-list" style="padding-top:8px"></div>
  <div class="fab-g"><button class="fab fab-p" id="fab-repo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>
</div>

<!-- ═══ REPO BROWSER SCREEN ═══ -->
<div id="browse-screen" class="screen">
  <div class="hdr">
    <button class="ib" id="browse-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
    <h1 id="browse-title" style="flex:1;margin-left:10px;font-size:18px">Repo</h1>
    <span class="cnt" id="browse-cnt">0</span>
  </div>
  <div class="sbar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="browse-search" placeholder="Search streams…"></div>
  <div class="filter-row" id="region-filters"><span class="filter-label">Region</span></div>
  <div class="filter-row" id="genre-filters"><span class="filter-label">Genre</span></div>
  <div class="sel-bar" id="sel-bar">
    <span class="sl" id="sel-cnt">0 selected</span>
    <div class="sr">
      <button class="sb-clr" id="sel-all">Select All</button>
      <button class="sb-clr" id="sel-none">Clear</button>
      <button class="sb-add" id="sel-add">Add to Playlist</button>
    </div>
  </div>
  <div class="list" id="browse-list"></div>
</div>

<!-- ═══ PLAYER SCREEN (web fallback) ═══ -->
<div id="player-screen" class="screen">
  <div class="pc" id="pc"></div>
  <div class="ld" id="ld"><div class="sp"></div></div>
  <div class="po" id="po">
    <div class="po-top"><button class="bbk" id="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button><div class="np"><div class="lb">Now Playing</div><div class="tt" id="p-title">—</div></div></div>
    <div class="po-ctr">
      <button class="sk" id="prev-btn"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg></button>
      <button class="pp" id="pp-btn"><svg id="ic-pa" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><svg id="ic-pl" viewBox="0 0 24 24" fill="currentColor" style="display:none"><polygon points="5 3 19 12 5 21"/></svg></button>
      <button class="sk" id="next-btn"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg></button>
    </div>
    <div class="po-bot"><div class="ui" id="p-url">—</div></div>
  </div>
</div>

</div><!-- app-content -->

<!-- Bottom Nav -->
<div class="bottom-nav" id="bnav">
  <div class="nav-item active" data-tab="lib-screen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    <span>Library</span>
  </div>
  <div class="nav-item" data-tab="repo-screen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
    <span>Repos</span>
  </div>
</div>
</div><!-- app -->

<!-- ═══ MODALS ═══ -->
<!-- Add/Edit Stream -->
<div class="mo" id="mo-edit"><div class="mc">
  <h2 id="mo-edit-t">Add Stream</h2>
  <label>Title *</label><input type="text" id="in-name" placeholder="Stream name">
  <label>Stream URL *</label><textarea id="in-url" placeholder="https://..."></textarea>
  <div class="row"><div><label>Category</label><input type="text" id="in-cat" placeholder="Movie, TV…"></div><div><label>EPG Title</label><input type="text" id="in-epg" placeholder="EPG name"></div></div>
  <label>Icon URL</label><input type="text" id="in-icon" placeholder="https://logo.png">
  <label>EPG Link</label><input type="text" id="in-epgl" placeholder="https://epg.xml">
  <div class="ma"><button class="bc" id="ed-cancel">Cancel</button><button class="bs" id="ed-save">Save</button></div>
</div></div>

<!-- Import M3U/JSON -->
<div class="mo" id="mo-imp"><div class="mc">
  <h2>Import Streams</h2>
  <div class="iz" id="imp-zone"><p>Tap to choose .json / .m3u / .m3u8</p><div class="h">or paste content below</div><input type="file" id="imp-file" accept=".json,.m3u,.m3u8"></div>
  <textarea id="imp-text" placeholder="#EXTM3U or JSON…" style="min-height:80px"></textarea>
  <div class="jp" id="imp-prev"></div>
  <div class="is" id="imp-stats"></div>
  <div class="ma"><button class="bc" id="imp-cancel">Cancel</button><button class="bs" id="imp-save">Import</button></div>
</div></div>

<!-- Add Repo -->
<div class="mo" id="mo-repo"><div class="mc">
  <h2>Add Repository</h2>
  <label>Repository Name *</label><input type="text" id="repo-name" placeholder="My IPTV Provider">
  <div class="iz" id="repo-zone"><p>Tap to choose a large .m3u file</p><div class="h">.m3u or .m3u8</div><input type="file" id="repo-file" accept=".m3u,.m3u8"></div>
  <label>Or paste M3U content</label><textarea id="repo-text" placeholder="#EXTM3U…" style="min-height:80px"></textarea>
  <div class="jp" id="repo-prev"></div>
  <div class="is" id="repo-stats"></div>
  <div class="ma"><button class="bc" id="repo-cancel">Cancel</button><button class="bs" id="repo-save">Add Repository</button></div>
</div></div>

<!-- Confirm -->
<div class="co" id="co"><div class="cb"><h3 id="co-t">Delete?</h3><p id="co-m">This cannot be undone.</p><div class="bs2"><button class="bc" id="co-no">Cancel</button><button style="background:var(--red);color:#fff" id="co-yes">Delete</button></div></div></div>
<div class="toast" id="toast"></div>

<script>
const V='3.1.0',B=6,SK='sv_media_v2',RK='sv_repos';

// ─── State ───
let items=[],repos=[],editId=null,delId=null,delType=null,curIdx=-1,hlsI=null;
let activeCat='All',overlayT=null,pendingImp=null;
// Repo browser state
let browseRepo=null,browseSelected=new Set(),browseRegion='All',browseGenre='All';

// ─── Persistence ───
function save(){try{localStorage.setItem(SK,JSON.stringify(items))}catch(e){}}
function load(){try{let d=localStorage.getItem(SK);if(!d)d=localStorage.getItem('streamvault_media_v2')||localStorage.getItem('streamvault_media');if(d){items=JSON.parse(d);items.forEach(m=>{m.icon=m.icon||'';m.epgLink=m.epgLink||'';m.epgTitle=m.epgTitle||'';m.region=m.region||'';m.tags=m.tags||[]})}}catch(e){}}
function saveRepos(){try{localStorage.setItem(RK,JSON.stringify(repos))}catch(e){}}
function loadRepos(){try{let d=localStorage.getItem(RK);if(d)repos=JSON.parse(d)}catch(e){}}

// ─── DOM ───
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function gid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6)}

// ─── Navigation ───
function showTab(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.toggle('active',n.dataset.tab===id);
  });
  $('bnav').style.display=(id==='player-screen'||id==='browse-screen')?'none':'flex';
}
document.querySelectorAll('.nav-item').forEach(n=>{
  n.onclick=()=>showTab(n.dataset.tab);
});

// ─── M3U Parser (enhanced with region/tag extraction) ───
function parseM3U(text){
  const lines=text.split(/\r?\n/),streams=[];
  let cur=null;
  for(let i=0;i<lines.length;i++){
    const l=lines[i].trim();
    if(!l||l==='#EXTM3U')continue;
    if(l.startsWith('#EXTINF:')){
      cur={name:'',url:'',category:'',icon:'',epgTitle:'',epgLink:'',region:'',tags:[]};
      cur.icon=xA(l,'tvg-logo');
      cur.epgTitle=xA(l,'tvg-id')||xA(l,'tvg-name');
      cur.category=xA(l,'group-title');
      cur.epgLink=xA(l,'tvg-url');
      const ci=l.lastIndexOf(',');
      const dn=ci>-1?l.substring(ci+1).trim():'';
      const tvgN=xA(l,'tvg-name');
      cur.name=tvgN||dn||'Untitled';
      // Extract region prefix: "US: CNN" → region:"US", name:"CNN"
      const rMatch=cur.name.match(/^([A-Z]{2})\s*[:|-]\s*(.+)/);
      if(rMatch){cur.region=rMatch[1];cur.name=rMatch[2].trim()}
      // Extract variant tags: "CNN (S)" → tags:["S"]
      const tMatch=cur.name.match(/\(([A-Z])\)\s*$/);
      if(tMatch){cur.tags=[tMatch[1]];cur.name=cur.name.replace(/\s*\([A-Z]\)\s*$/,'')}
    }else if(l.startsWith('#EXTGRP:')){
      if(cur)cur.category=cur.category||l.substring(8).trim();
    }else if(l.startsWith('#'))continue;
    else if(l.match(/^https?:\/\//)||l.match(/^rtmp/)){
      if(cur){cur.url=l;streams.push(cur);cur=null}
      else streams.push({name:l.split('/').pop()||l,url:l,category:'',icon:'',epgTitle:'',epgLink:'',region:'',tags:[]});
    }
  }
  return streams;
}
function xA(l,a){const m=l.match(new RegExp(a+'=["\']([^"\']*)["\']','i'));return m?m[1].trim():''}
function isM3U(t){const s=t.trim();return s.startsWith('#EXTM3U')||s.startsWith('#EXTINF:')||(s.includes('#EXTINF:')&&s.includes('http'))}

// ─── URL helpers ───
function extractUrl(raw){try{const u=new URL(raw);if(u.hostname.includes('webplayer.online')){const p=u.searchParams.get('url');if(p)return p.replace(/@top$/,'')}}catch(e){}return raw}

// ─── LIBRARY ───
function getCats(){const c=new Set();items.forEach(m=>{if(m.category)c.add(m.category)});return['All',...[...c].sort()]}
function getFiltered(){
  const q=$('lib-search').value.toLowerCase().trim();
  return items.filter(m=>{
    const mc=activeCat==='All'||m.category===activeCat;
    const ms=!q||m.title.toLowerCase().includes(q)||m.url.toLowerCase().includes(q)||(m.epgTitle&&m.epgTitle.toLowerCase().includes(q));
    return mc&&ms;
  });
}
function renderCats(){
  const c=getCats();
  $('lib-pills').innerHTML=c.length<=1?'':c.map(x=>`<div class="pill${x===activeCat?' on':''}" data-c="${esc(x)}">${esc(x)}</div>`).join('');
  $('lib-pills').querySelectorAll('.pill').forEach(p=>p.onclick=()=>{activeCat=p.dataset.c;renderCats();renderLib()});
}
function renderLib(){
  const f=getFiltered();
  if(!f.length){
    const s=$('lib-search').value.trim()||activeCat!=='All';
    $('lib-list').innerHTML=`<div class="empty"><div class="ew"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">${s?'<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>':'<polygon points="23 7 16 12 23 17"/><rect x="1" y="5" width="15" height="14" rx="2"/>'}</svg></div><h3>${s?'No results':'No streams yet'}</h3><p>${s?'Try different search':'Tap + to add or browse Repositories'}</p></div>`;
    return;
  }
  $('lib-list').innerHTML=f.map((m,i)=>{
    const th=m.icon?`<img src="${esc(m.icon)}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><svg style="display:none" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>`:`<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>`;
    const cb=m.category?`<span class="cb">${esc(m.category)}</span>`:'';
    const rb=m.region?`<span class="rb">${esc(m.region)}</span>`:'';
    return`<div class="item" style="animation-delay:${i*.02}s" onclick="playIt('${m.id}')"><div class="th">${th}</div><div class="nfo"><div class="nm">${esc(m.title)}</div><div class="mt">${rb}${cb}${esc(truncU(m.url))}</div></div><div class="acts"><button class="eb" onclick="event.stopPropagation();openEd('${m.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="db" onclick="event.stopPropagation();confirmDel('${m.id}','item')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div></div>`}).join('');
}
function truncU(u){try{const x=new URL(u);return x.hostname+x.pathname.substring(0,20)+(x.pathname.length>20?'…':'')}catch{return u.substring(0,35)}}
$('lib-search').oninput=renderLib;

// ─── Add/Edit ───
$('fab-add').onclick=()=>{editId=null;$('mo-edit-t').textContent='Add Stream';$('in-name').value='';$('in-url').value='';$('in-cat').value='';$('in-epg').value='';$('in-icon').value='';$('in-epgl').value='';$('mo-edit').classList.add('on')};
window.openEd=id=>{const m=items.find(x=>x.id===id);if(!m)return;editId=id;$('mo-edit-t').textContent='Edit Stream';$('in-name').value=m.title;$('in-url').value=m.url;$('in-cat').value=m.category||'';$('in-epg').value=m.epgTitle||'';$('in-icon').value=m.icon||'';$('in-epgl').value=m.epgLink||'';$('mo-edit').classList.add('on')};
$('ed-cancel').onclick=()=>$('mo-edit').classList.remove('on');
$('mo-edit').onclick=e=>{if(e.target===$('mo-edit'))$('mo-edit').classList.remove('on')};
$('ed-save').onclick=()=>{
  const t=$('in-name').value.trim(),u=$('in-url').value.trim();
  if(!t){toast('Title required');return}if(!u){toast('URL required');return}
  const d={title:t,url:u,category:$('in-cat').value.trim(),icon:$('in-icon').value.trim(),epgLink:$('in-epgl').value.trim(),epgTitle:$('in-epg').value.trim()};
  if(editId){const m=items.find(x=>x.id===editId);if(m)Object.assign(m,d);toast('Updated')}
  else{items.push({id:gid(),...d,region:'',tags:[],added:Date.now()});toast('Added')}
  save();$('mo-edit').classList.remove('on');renderCats();renderLib();
};

// ─── Delete ───
window.confirmDel=(id,type)=>{delId=id;delType=type;$('co').classList.add('on')};
$('co-no').onclick=()=>{$('co').classList.remove('on')};
$('co-yes').onclick=()=>{
  if(delType==='item'){items=items.filter(m=>m.id!==delId);save();renderCats();renderLib()}
  else if(delType==='repo'){repos=repos.filter(r=>r.id!==delId);saveRepos();renderRepos()}
  $('co').classList.remove('on');toast('Deleted');
};

// ─── Import ───
$('btn-imp').onclick=()=>{pendingImp=null;$('imp-text').value='';$('imp-prev').style.display='none';$('imp-stats').style.display='none';$('mo-imp').classList.add('on')};
$('imp-cancel').onclick=()=>$('mo-imp').classList.remove('on');
$('mo-imp').onclick=e=>{if(e.target===$('mo-imp'))$('mo-imp').classList.remove('on')};
$('imp-zone').onclick=()=>$('imp-file').click();
$('imp-file').onchange=e=>{if(e.target.files[0])readF(e.target.files[0],t=>{$('imp-text').value=t;valImp(t)})};
$('imp-text').oninput=()=>valImp($('imp-text').value);
function readF(f,cb){const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsText(f)}

function valImp(text){
  const t=text.trim();if(!t){pendingImp=null;$('imp-prev').style.display='none';$('imp-stats').style.display='none';return}
  try{
    let v,fmt;
    if(isM3U(t)){fmt='M3U';v=parseM3U(t).filter(d=>d.name&&d.url)}
    else{fmt='JSON';let d=JSON.parse(t);if(!Array.isArray(d))d=[d];v=d.filter(x=>(x.name||x.title)&&x.url).map(x=>({name:x.name||x.title,url:x.url,category:x.category||'',icon:x.icon||'',epgLink:x.epgLink||'',epgTitle:x.epgTitle||'',region:'',tags:[]}))}
    if(!v.length)throw new Error('No valid streams');
    pendingImp=v;
    $('imp-prev').style.display='block';$('imp-prev').style.color='var(--grn)';
    $('imp-prev').textContent=`✓ ${v.length} streams from ${fmt}:\n`+v.slice(0,6).map(d=>`  • ${d.name}`).join('\n')+(v.length>6?`\n  … +${v.length-6} more`:'');
    $('imp-stats').style.display='block';
    const cats=new Set(v.map(d=>d.category).filter(Boolean));
    $('imp-stats').textContent=`${v.length} streams · ${cats.size} categories`;
  }catch(e){pendingImp=null;$('imp-prev').style.display='block';$('imp-prev').style.color='var(--red)';$('imp-prev').textContent='✗ '+e.message;$('imp-stats').style.display='none'}
}
$('imp-save').onclick=()=>{
  if(!pendingImp){valImp($('imp-text').value);if(!pendingImp){toast('No valid data');return}}
  let a=0,s=0;
  pendingImp.forEach(d=>{
    if(items.some(m=>m.url===d.url)){s++;return}
    items.push({id:gid(),title:d.name,url:d.url,category:d.category,icon:d.icon,epgLink:d.epgLink,epgTitle:d.epgTitle,region:d.region||'',tags:d.tags||[],added:Date.now()});a++});
  save();$('mo-imp').classList.remove('on');renderCats();renderLib();
  toast(`Imported ${a}${s?' · '+s+' dupes':''}`);
};

// ─── Export ───
$('btn-exp').onclick=()=>{
  if(!items.length){toast('Nothing to export');return}
  const c=confirm('OK = JSON\nCancel = M3U');
  if(c){const j=JSON.stringify(items.map(m=>({name:m.title,url:m.url,category:m.category||undefined,icon:m.icon||undefined,epgTitle:m.epgTitle||undefined,epgLink:m.epgLink||undefined})),null,2);dl(j,'application/json',`sv-${ds()}.json`)}
  else{let m='#EXTM3U\n\n';items.forEach(x=>{let e='#EXTINF:-1';if(x.epgTitle)e+=` tvg-id="${x.epgTitle}" tvg-name="${x.epgTitle}"`;if(x.icon)e+=` tvg-logo="${x.icon}"`;if(x.category)e+=` group-title="${x.category}"`;e+=`,${x.title}`;m+=e+'\n'+x.url+'\n\n'});dl(m,'audio/x-mpegurl',`sv-${ds()}.m3u`)}
  toast('Exported '+items.length);
};
function dl(c,t,n){const b=new Blob([c],{type:t}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;a.click()}
function ds(){return new Date().toISOString().slice(0,10)}

// ═══ REPOSITORIES ═══
$('fab-repo').onclick=()=>{$('repo-name').value='';$('repo-text').value='';$('repo-prev').style.display='none';$('repo-stats').style.display='none';$('mo-repo').classList.add('on')};
$('repo-cancel').onclick=()=>$('mo-repo').classList.remove('on');
$('mo-repo').onclick=e=>{if(e.target===$('mo-repo'))$('mo-repo').classList.remove('on')};
$('repo-zone').onclick=()=>$('repo-file').click();
$('repo-file').onchange=e=>{if(e.target.files[0]){const f=e.target.files[0];if(!$('repo-name').value.trim())$('repo-name').value=f.name.replace(/\.(m3u8?|json)$/i,'');readF(f,t=>{$('repo-text').value=t;valRepo(t)})}};
$('repo-text').oninput=()=>valRepo($('repo-text').value);

function valRepo(text){
  const t=text.trim();if(!t){$('repo-prev').style.display='none';$('repo-stats').style.display='none';return}
  try{
    const streams=parseM3U(t).filter(d=>d.name&&d.url);
    if(!streams.length)throw new Error('No streams found in M3U');
    $('repo-prev').style.display='block';$('repo-prev').style.color='var(--grn)';
    const regions=new Set(streams.map(s=>s.region).filter(Boolean));
    const cats=new Set(streams.map(s=>s.category).filter(Boolean));
    $('repo-prev').textContent=`✓ ${streams.length} streams\n  Regions: ${regions.size?[...regions].slice(0,8).join(', '):'none'}\n  Genres: ${cats.size?[...cats].slice(0,8).join(', '):'none'}`;
    $('repo-stats').style.display='block';$('repo-stats').textContent=`${streams.length} streams · ${regions.size} regions · ${cats.size} genres`;
    $('repo-save').dataset.count=streams.length;
  }catch(e){$('repo-prev').style.display='block';$('repo-prev').style.color='var(--red)';$('repo-prev').textContent='✗ '+e.message;$('repo-stats').style.display='none'}
}
$('repo-save').onclick=()=>{
  const name=$('repo-name').value.trim();
  if(!name){toast('Name required');return}
  const text=$('repo-text').value.trim();
  if(!text){toast('Paste or upload M3U');return}
  const streams=parseM3U(text).filter(d=>d.name&&d.url);
  if(!streams.length){toast('No valid streams');return}
  repos.push({id:gid(),name,streams,addedAt:Date.now()});
  saveRepos();$('mo-repo').classList.remove('on');renderRepos();
  toast(`Repo "${name}" added · ${streams.length} streams`);
};

function renderRepos(){
  $('repo-cnt').textContent=repos.length+' repo'+(repos.length!==1?'s':'');
  if(!repos.length){
    $('repo-list').innerHTML=`<div class="empty"><div class="ew"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></div><h3>No repositories</h3><p>Tap + to add a large M3U playlist as a browsable repository</p></div>`;
    return;
  }
  $('repo-list').innerHTML=repos.map(r=>{
    const regs=new Set(r.streams.map(s=>s.region).filter(Boolean));
    const cats=new Set(r.streams.map(s=>s.category).filter(Boolean));
    return`<div class="repo-card" onclick="openRepo('${r.id}')"><div class="rc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></div><div class="rc-info"><div class="rc-name">${esc(r.name)}</div><div class="rc-meta">${r.streams.length} streams · ${regs.size} regions · ${cats.size} genres</div></div><button class="rc-del" onclick="event.stopPropagation();confirmDel('${r.id}','repo')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div>`}).join('');
}

// ═══ REPO BROWSER ═══
window.openRepo=id=>{
  const r=repos.find(x=>x.id===id);if(!r)return;
  browseRepo=r;browseSelected=new Set();browseRegion='All';browseGenre='All';
  $('browse-title').textContent=r.name;
  $('browse-search').value='';
  showTab('browse-screen');
  buildFilters();renderBrowse();
};
$('browse-back').onclick=()=>showTab('repo-screen');

function getRepoRegions(){if(!browseRepo)return[];const s=new Set(browseRepo.streams.map(x=>x.region).filter(Boolean));return['All',...[...s].sort()]}
function getRepoGenres(){if(!browseRepo)return[];const s=new Set(browseRepo.streams.map(x=>x.category).filter(Boolean));return['All',...[...s].sort()]}

function buildFilters(){
  const regs=getRepoRegions(),genres=getRepoGenres();
  $('region-filters').innerHTML='<span class="filter-label">Region</span>'+regs.map(r=>`<div class="pill${r===browseRegion?' on':''}" data-r="${esc(r)}">${esc(r)}</div>`).join('');
  $('genre-filters').innerHTML='<span class="filter-label">Genre</span>'+genres.map(g=>`<div class="pill${g===browseGenre?' on':''}" data-g="${esc(g)}">${esc(g)}</div>`).join('');
  $('region-filters').querySelectorAll('.pill').forEach(p=>p.onclick=()=>{browseRegion=p.dataset.r;buildFilters();renderBrowse()});
  $('genre-filters').querySelectorAll('.pill').forEach(p=>p.onclick=()=>{browseGenre=p.dataset.g;buildFilters();renderBrowse()});
}

function getBrowseFiltered(){
  if(!browseRepo)return[];
  const q=$('browse-search').value.toLowerCase().trim();
  return browseRepo.streams.filter(s=>{
    const mr=browseRegion==='All'||s.region===browseRegion;
    const mg=browseGenre==='All'||s.category===browseGenre;
    const ms=!q||s.name.toLowerCase().includes(q)||(s.category&&s.category.toLowerCase().includes(q))||(s.region&&s.region.toLowerCase().includes(q));
    return mr&&mg&&ms;
  });
}

function renderBrowse(){
  const f=getBrowseFiltered();
  $('browse-cnt').textContent=f.length+' / '+(browseRepo?browseRepo.streams.length:0);
  // Selection bar
  const sb=$('sel-bar');
  if(browseSelected.size>0){sb.classList.add('on');$('sel-cnt').textContent=browseSelected.size+' selected'}
  else sb.classList.remove('on');

  if(!f.length){
    $('browse-list').innerHTML=`<div class="empty"><div class="ew"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><h3>No matches</h3><p>Try different filters or search terms</p></div>`;
    return;
  }
  // Check which URLs already in playlist
  const existingUrls=new Set(items.map(m=>m.url));

  $('browse-list').innerHTML=f.map((s,i)=>{
    const key=s.url;
    const sel=browseSelected.has(key);
    const exists=existingUrls.has(key);
    const th=s.icon?`<img src="${esc(s.icon)}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><svg style="display:none" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>`:`<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>`;
    const rb=s.region?`<span class="rb">${esc(s.region)}</span>`:'';
    const cb=s.category?`<span class="cb">${esc(s.category)}</span>`:'';
    const ex=exists?'<span style="color:var(--grn);font-size:9px;margin-left:4px">✓ added</span>':'';
    return`<div class="rb-item${sel?' selected':''}" data-url="${esc(key)}" onclick="toggleSel(this)" style="animation-delay:${Math.min(i*.01,.3)}s"><div class="chk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><div class="rb-th">${th}</div><div class="rb-info"><div class="rb-nm">${esc(s.name)}${ex}</div><div class="rb-mt">${rb}${cb}</div></div></div>`}).join('');
}

window.toggleSel=el=>{
  const url=el.dataset.url;
  if(browseSelected.has(url)){browseSelected.delete(url);el.classList.remove('selected')}
  else{browseSelected.add(url);el.classList.add('selected')}
  const sb=$('sel-bar');
  if(browseSelected.size>0){sb.classList.add('on');$('sel-cnt').textContent=browseSelected.size+' selected'}
  else sb.classList.remove('on');
};

$('browse-search').oninput=renderBrowse;
$('sel-all').onclick=()=>{getBrowseFiltered().forEach(s=>browseSelected.add(s.url));renderBrowse()};
$('sel-none').onclick=()=>{browseSelected.clear();renderBrowse()};
$('sel-add').onclick=()=>{
  if(!browseRepo||browseSelected.size===0)return;
  let a=0,s=0;
  browseRepo.streams.filter(x=>browseSelected.has(x.url)).forEach(d=>{
    if(items.some(m=>m.url===d.url)){s++;return}
    items.push({id:gid(),title:d.name,url:d.url,category:d.category,icon:d.icon,epgLink:d.epgLink,epgTitle:d.epgTitle,region:d.region,tags:d.tags||[],added:Date.now()});a++});
  save();browseSelected.clear();renderBrowse();renderCats();renderLib();
  toast(`Added ${a} to playlist${s?' · '+s+' dupes':''}`);
};

// ═══ PLAYER ═══
function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');$('bnav').style.display=id==='player-screen'?'none':'flex'}
function destroyP(){if(hlsI){hlsI.destroy();hlsI=null}$('pc').innerHTML='';$('ld').style.display='flex'}

window.playIt=id=>{
  const idx=items.findIndex(m=>m.id===id);if(idx===-1)return;
  curIdx=idx;const m=items[idx];
  const url=extractUrl(m.url);
  // Native ExoPlayer
  if(window.NativePlayer&&window.NativePlayer.isAvailable()){
    window.NativePlayer.play(url,m.title||'Stream',[m.category,m.epgTitle].filter(Boolean).join(' · '));
    return;
  }
  // Web fallback
  showScr('player-screen');
  $('p-title').textContent=m.title;$('p-url').textContent=m.url;
  destroyP();
  if(Hls.isSupported()){
    const v=document.createElement('video');v.setAttribute('playsinline','');v.setAttribute('autoplay','');v.style.cssText='width:100%;height:100%;background:#000';
    $('pc').appendChild(v);
    hlsI=new Hls({enableWorker:true});hlsI.attachMedia(v);
    hlsI.on(Hls.Events.MEDIA_ATTACHED,()=>hlsI.loadSource(url));
    hlsI.on(Hls.Events.MANIFEST_PARSED,()=>{$('ld').style.display='none';v.play().catch(()=>{})});
    hlsI.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal){const ifr=document.createElement('iframe');ifr.src=m.url;ifr.style.cssText='width:100%;height:100%;border:none';ifr.setAttribute('allowfullscreen','');$('pc').innerHTML='';$('pc').appendChild(ifr);$('ld').style.display='none'}});
  }else{const ifr=document.createElement('iframe');ifr.src=m.url;ifr.style.cssText='width:100%;height:100%;border:none';ifr.setAttribute('allowfullscreen','');$('pc').appendChild(ifr);setTimeout(()=>$('ld').style.display='none',3000)}
  showOvr();
};

function showOvr(){$('po').classList.add('vis');clearTimeout(overlayT);overlayT=setTimeout(()=>$('po').classList.remove('vis'),4500)}
$('player-screen').onclick=e=>{if(!e.target.closest('button')){if($('po').classList.contains('vis')){$('po').classList.remove('vis');clearTimeout(overlayT)}else showOvr()}};
$('back-btn').onclick=e=>{e.stopPropagation();destroyP();showTab('lib-screen')};
$('pp-btn').onclick=e=>{e.stopPropagation();const v=$('pc').querySelector('video');if(!v)return;if(v.paused){v.play();$('ic-pl').style.display='none';$('ic-pa').style.display='block'}else{v.pause();$('ic-pl').style.display='block';$('ic-pa').style.display='none'}showOvr()};
$('prev-btn').onclick=e=>{e.stopPropagation();if(!items.length)return;curIdx=(curIdx-1+items.length)%items.length;playIt(items[curIdx].id)};
$('next-btn').onclick=e=>{e.stopPropagation();if(!items.length)return;curIdx=(curIdx+1)%items.length;playIt(items[curIdx].id)};

// Back button
window.addEventListener('popstate',()=>{if($('player-screen').classList.contains('active')){destroyP();showTab('lib-screen')}else if($('browse-screen').classList.contains('active'))showTab('repo-screen')});
document.onkeydown=e=>{if(e.key==='Escape'){if($('player-screen').classList.contains('active')){destroyP();showTab('lib-screen')}else if($('browse-screen').classList.contains('active'))showTab('repo-screen')}};

// ─── Init ───
load();loadRepos();renderCats();renderLib();renderRepos();
</script>
</body>
</html>
